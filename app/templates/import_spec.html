{% extends "layout.html" %}
{% block content %}
<section class="stack-md">
  <article class="ios-card detail-card stack-sm">
    <h2 class="section-title">Upload Specification</h2>
    <p class="muted-text">Type: {{ type_item.type_name }}</p>

    {% if message %}
    <p class="muted-text">{{ message }}</p>
    {% endif %}

    <form method="post" enctype="multipart/form-data" class="stack-sm">
      <input type="file" name="file" accept=".xlsx" required>
      <button type="submit" class="btn-primary">Upload</button>
    </form>
  </article>
</section>
{% endblock %}
